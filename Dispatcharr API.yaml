  /api/backups/:
    get:
      operationId: api_backups_retrieve
      description: List all available backup files.
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/{filename}/delete/:
    delete:
      operationId: api_backups_delete_destroy
      description: Delete a backup file.
      parameters:
      - in: path
        name: filename
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/backups/{filename}/download/:
    get:
      operationId: api_backups_download_retrieve
      description: |-
        Download a backup file.

        Requires either:
        - Valid admin authentication, OR
        - Valid download_token query parameter
      parameters:
      - in: path
        name: filename
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/backups/{filename}/download-token/:
    get:
      operationId: api_backups_download_token_retrieve
      description: Get a signed token for downloading a backup file.
      parameters:
      - in: path
        name: filename
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/{filename}/restore/:
    post:
      operationId: api_backups_restore_create
      description: 'Restore from a backup file (async via Celery). WARNING: This will
        flush the database!'
      parameters:
      - in: path
        name: filename
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/create/:
    post:
      operationId: api_backups_create_create
      description: Create a new backup (async via Celery).
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/schedule/:
    get:
      operationId: api_backups_schedule_retrieve
      description: Get backup schedule settings.
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/schedule/update/:
    put:
      operationId: api_backups_schedule_update_update
      description: Update backup schedule settings.
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/backups/status/{task_id}/:
    get:
      operationId: api_backups_status_retrieve
      description: |-
        Check the status of a backup/restore task.

        Requires either:
        - Valid admin authentication, OR
        - Valid task_token query parameter
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/backups/upload/:
    post:
      operationId: api_backups_upload_create
      description: Upload a backup file for restoration.
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/channels/channels/:
    get:
      operationId: api_channels_channels_list
      parameters:
      - in: query
        name: channel_group
        schema:
          type: string
      - in: query
        name: epg
        schema:
          type: string
      - in: query
        name: name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChannelList'
          description: ''
    post:
      operationId: api_channels_channels_create
      description: Override create to handle channel profile membership
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Channel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Channel'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
