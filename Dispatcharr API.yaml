components:
  schemas:
    AccountTypeEnum:
      enum:
      - STD
      - XC
      type: string
      description: |-
        * `STD` - Standard
        * `XC` - Xtream Codes
    AssignChannelsRequest:
      type: object
      properties:
        starting_number:
          type: number
          format: double
          description: Starting channel number to assign (can be decimal)
        channel_ids:
          type: array
          items:
            type: integer
          description: Channel IDs to assign
      required:
      - channel_ids
    BatchSetEpgRequest:
      type: object
      properties:
        associations:
          type: array
          items:
            $ref: '#/components/schemas/EpgAssociation'
      required:
      - associations
    BulkRemoveSeriesRecordingsRequest:
      type: object
      properties:
        tvg_id:
          type: string
          description: Channel TVG ID (required)
        title:
          type: string
          description: Series title - when scope=title, only recordings matching this
            title are removed
        scope:
          allOf:
          - $ref: '#/components/schemas/ScopeEnum'
          default: title
          description: |-
            title: remove only matching title on channel, channel: remove all future recordings on channel

            * `title` - title
            * `channel` - channel
      required:
      - tvg_id
    CategoryTypeEnum:
      enum:
      - movie
      - series
      type: string
      description: |-
        * `movie` - Movie
        * `series` - Series
    ChanneProfilelMembershipUpdate:
      type: object
      properties:
        channel_id:
          type: integer
        enabled:
          type: boolean
      required:
      - channel_id
      - enabled
    Channel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        channel_number:
          type: number
          format: double
          nullable: true
        name:
          type: string
          maxLength: 255
        channel_group_id:
          type: integer
        tvg_id:
          type: string
          nullable: true
          maxLength: 255
        tvc_guide_stationid:
          type: string
          nullable: true
          maxLength: 255
        epg_data_id:
          type: integer
          nullable: true
        streams:
          type: array
          items:
            type: integer
        stream_profile_id:
          type: integer
          nullable: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        logo_id:
          type: integer
          nullable: true
        user_level:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_adult:
          type: boolean
          description: Whether this channel contains adult content
        auto_created:
          type: boolean
          description: Whether this channel was automatically created via M3U auto
            channel sync
        auto_created_by:
          type: integer
          nullable: true
          description: The M3U account that auto-created this channel
        auto_created_by_name:
          type: string
          readOnly: true
      required:
      - auto_created_by_name
      - id
      - name
      - uuid
    ChannelGroup:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        channel_count:
          type: string
          readOnly: true
        m3u_account_count:
          type: string
          readOnly: true
        m3u_accounts:
          type: array
          items:
            $ref: '#/components/schemas/ChannelGroupM3UAccount'
          readOnly: true
      required:
      - channel_count
      - id
      - m3u_account_count
      - m3u_accounts
      - name
    ChannelGroupM3UAccount:
      type: object
      properties:
        m3u_accounts:
          type: integer
          readOnly: true
        channel_group:
          type: integer
        enabled:
          type: boolean
        auto_channel_sync:
          type: boolean
          default: false
        auto_sync_channel_start:
          type: number
          format: double
          nullable: true
        custom_properties: {}
        is_stale:
          type: boolean
          description: Whether this group relationship is stale (not seen in recent
            refresh, pending deletion)
        last_seen:
          type: string
          format: date-time
          description: Last time this group was seen in the M3U source during a refresh
      required:
      - channel_group
      - enabled
      - m3u_accounts
    ChannelProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        channels:
          type: string
          readOnly: true
      required:
      - channels
      - id
      - name
    CleanupUnusedLogosRequest:
      type: object
      properties:
        delete_files:
          type: boolean
          default: false
          description: Whether to delete local logo files from disk
    CoreSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        key:
          type: string
          maxLength: 255
        name:
          type: string
          maxLength: 255
        value: {}
      required:
      - id
      - key
      - name
    CurrentProgramsRequest:
      type: object
      properties:
        channel_ids:
          type: array
          items:
            type: integer
          nullable: true
          description: Array of channel IDs. If null or omitted, returns all channels
            with current programs.
    EPGData:
      type: object
      description: |-
        Only returns the tvg_id and the 'name' field from EPGData.
        We assume 'name' is effectively the channel name.
      properties:
        id:
          type: integer
          readOnly: true
        tvg_id:
          type: string
          nullable: true
          maxLength: 255
        name:
          type: string
          maxLength: 255
        icon_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        epg_source:
          type: integer
          nullable: true
      required:
      - id
      - name
    EPGSource:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        source_type:
          $ref: '#/components/schemas/SourceTypeEnum'
        url:
          type: string
          nullable: true
        api_key:
          type: string
          nullable: true
          maxLength: 255
        is_active:
          type: boolean
        file_path:
          type: string
          nullable: true
          maxLength: 1024
        refresh_interval:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        priority:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Priority for EPG matching (higher numbers = higher priority).
            Used when multiple EPG sources have matching entries for a channel.
        status:
          $ref: '#/components/schemas/EPGSourceStatusEnum'
        last_message:
          type: string
          nullable: true
          description: Last status message, including success results or error information
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Time when this source was created
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Time when this source was last successfully refreshed
        custom_properties:
          nullable: true
          description: Custom properties for dummy EPG configuration (regex patterns,
            timezone, duration, etc.)
        epg_data_count:
          type: string
          readOnly: true
      required:
      - created_at
      - epg_data_count
      - id
      - name
      - source_type
    EPGSourceStatusEnum:
      enum:
      - idle
      - fetching
      - parsing
      - error
      - success
      - disabled
      type: string
      description: |-
        * `idle` - Idle
        * `fetching` - Fetching
        * `parsing` - Parsing
        * `error` - Error
        * `success` - Success
        * `disabled` - Disabled
    EpgAssociation:
      type: object
      properties:
        channel_id:
          type: integer
        epg_data_id:
          type: integer
      required:
      - channel_id
      - epg_data_id
    Episode:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        series:
          allOf:
          - $ref: '#/components/schemas/Series'
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        air_date:
          type: string
          format: date
          nullable: true
        rating:
          type: string
          nullable: true
          maxLength: 10
        duration_secs:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: Duration in seconds
        season_number:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        episode_number:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        tmdb_id:
          type: string
          nullable: true
          description: TMDB ID for metadata
          maxLength: 50
        imdb_id:
          type: string
          nullable: true
          description: IMDB ID for metadata
          maxLength: 50
        custom_properties:
          nullable: true
          description: Custom properties for this episode
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - series
      - updated_at
      - uuid
    EvaluateSeriesRulesRequest:
      type: object
      properties:
        tvg_id:
          type: string
          description: 'Optional: evaluate only rules for this channel TVG ID. If
            omitted, all rules are evaluated.'
    FilterTypeEnum:
      enum:
      - group
      - name
      - url
      type: string
      description: |-
        * `group` - Group
        * `name` - Stream Name
        * `url` - Stream URL
    FromStreamBulkRequest:
      type: object
      properties:
        stream_ids:
          type: array
          items:
            type: integer
          description: List of stream IDs to create channels from
        channel_profile_ids:
          type: array
          items:
            type: integer
          description: '(Optional) Channel profile ID(s). Behavior: omitted = add
            to ALL profiles (default); empty array [] = add to NO profiles; [0] =
            add to ALL profiles (explicit); [1,2,...] = add only to specified profiles.'
        starting_channel_number:
          type: integer
          description: '(Optional) Starting channel number mode: null=use provider
            numbers, 0=lowest available, other=start from specified number'
      required:
      - stream_ids
    FromStreamRequest:
      type: object
      properties:
        stream_id:
          type: integer
          description: ID of the stream to link
        channel_number:
          type: number
          format: double
          description: (Optional) Desired channel number. Must not be in use.
        name:
          type: string
          description: Desired channel name
        channel_profile_ids:
          type: array
          items:
            type: integer
          description: '(Optional) Channel profile ID(s). Behavior: omitted = add
            to ALL profiles (default); empty array [] = add to NO profiles; [0] =
            add to ALL profiles (explicit); [1,2,...] = add only to specified profiles.'
      required:
      - stream_id
    Group:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        permissions:
          type: array
          items:
            type: integer
      required:
      - id
      - name
      - permissions
    HDHRDevice:
      type: object
      description: Serializer for HDHomeRun device information
      properties:
        id:
          type: integer
          readOnly: true
        friendly_name:
          type: string
          maxLength: 100
        device_id:
          type: string
          maxLength: 32
        tuner_count:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - device_id
      - id
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
      - password
      - username
    Logo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        url:
          type: string
        cache_url:
          type: string
          readOnly: true
        channel_count:
          type: string
          readOnly: true
        is_used:
          type: string
          readOnly: true
        channel_names:
          type: string
          readOnly: true
      required:
      - cache_url
      - channel_count
      - channel_names
      - id
      - is_used
      - name
      - url
    M3UAccount:
      type: object
      description: Serializer for M3U Account
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Unique name for this M3U account
          maxLength: 255
        server_url:
          type: string
          nullable: true
        file_path:
          type: string
          nullable: true
          maxLength: 255
        server_group:
          type: integer
          nullable: true
          description: The server group this M3U account belongs to
        max_streams:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Maximum number of concurrent streams (0 for unlimited)
        is_active:
          type: boolean
          description: Set to false to deactivate this M3U account
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Time when this account was created
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Time when this account was last successfully refreshed
        filters:
          type: string
          readOnly: true
        user_agent:
          type: integer
          nullable: true
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/M3UAccountProfile'
          readOnly: true
        locked:
          type: boolean
          description: Protected - can't be deleted or modified
        channel_groups:
          type: array
          items:
            $ref: '#/components/schemas/ChannelGroupM3UAccount'
        refresh_interval:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        custom_properties:
          nullable: true
        account_type:
          $ref: '#/components/schemas/AccountTypeEnum'
        username:
          type: string
          nullable: true
          maxLength: 255
        password:
          type: string
          nullable: true
          maxLength: 255
        stale_stream_days:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Number of days after which a stream will be removed if not
            seen in the M3U source.
        priority:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Priority for VOD provider selection (higher numbers = higher
            priority). Used when multiple providers offer the same content.
        status:
          $ref: '#/components/schemas/M3UAccountStatusEnum'
        last_message:
          type: string
          nullable: true
          description: Last status message, including success results or error information
        enable_vod:
          type: boolean
          writeOnly: true
        auto_enable_new_groups_live:
          type: boolean
          writeOnly: true
        auto_enable_new_groups_vod:
          type: boolean
          writeOnly: true
        auto_enable_new_groups_series:
          type: boolean
          writeOnly: true
      required:
      - created_at
      - filters
      - id
      - name
      - profiles
    M3UAccountProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name for the M3U account profile
          maxLength: 255
        max_streams:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Maximum number of concurrent streams (0 for unlimited)
        is_active:
          type: boolean
          description: Set to false to deactivate this profile
        is_default:
          type: boolean
          description: Set to false to deactivate this profile
        current_viewers:
          type: integer
          maximum: 2147483647
          minimum: 0
        search_pattern:
          type: string
          maxLength: 255
        replace_pattern:
          type: string
          maxLength: 255
        custom_properties:
          nullable: true
          description: Custom properties for storing account information from provider
            (e.g., XC account details, expiration dates)
        account:
          type: string
          readOnly: true
      required:
      - account
      - id
      - name
    M3UAccountStatusEnum:
      enum:
      - idle
      - fetching
      - parsing
      - error
      - success
      - pending_setup
      - disabled
      type: string
      description: |-
        * `idle` - Idle
        * `fetching` - Fetching
        * `parsing` - Parsing
        * `error` - Error
        * `success` - Success
        * `pending_setup` - Pending Setup
        * `disabled` - Disabled
    M3UFilter:
      type: object
      description: Serializer for M3U Filters
      properties:
        id:
          type: integer
          readOnly: true
        filter_type:
          allOf:
          - $ref: '#/components/schemas/FilterTypeEnum'
          description: |-
            Filter based on either group title or stream name.

            * `group` - Group
            * `name` - Stream Name
            * `url` - Stream URL
        regex_pattern:
          type: string
          description: A regex pattern to match streams or groups.
          maxLength: 200
        exclude:
          type: boolean
          description: If True, matching items are excluded; if False, only matches
            are included.
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        custom_properties:
          nullable: true
      required:
      - id
      - regex_pattern
    M3UVODCategoryRelation:
      type: object
      properties:
        category:
          type: integer
        m3u_account:
          type: integer
        enabled:
          type: boolean
          description: Set to false to deactivate this category for the M3U account
      required:
      - category
      - m3u_account
    MatchEpgRequest:
      type: object
      properties:
        channel_ids:
          type: array
          items:
            type: integer
          description: List of channel IDs to process. If empty or not provided, all
            channels without EPG will be processed.
    ModeEnum:
      enum:
      - all
      - new
      type: string
      description: |-
        * `all` - all
        * `new` - new
    Movie:
