        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        user_level:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        password:
          type: string
          writeOnly: true
        channel_profiles:
          type: array
          items:
            type: integer
        custom_properties:
          nullable: true
        avatar_config:
          nullable: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        last_login:
          type: string
          format: date-time
          nullable: true
        date_joined:
          type: string
          format: date-time
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - id
      - password
      - username
    UserAgent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: The User-Agent name.
          maxLength: 512
        user_agent:
          type: string
          description: The complete User-Agent string sent by the client.
          maxLength: 512
        description:
          type: string
          description: An optional description of the client or device type.
          maxLength: 255
        is_active:
          type: boolean
          description: Whether this user agent is currently allowed/recognized.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
