        '204':
          description: No response body
  /api/channels/channels/edit/bulk/:
    patch:
      operationId: api_channels_channels_edit_bulk_partial_update
      description: |-
        Bulk edit channels efficiently.
        Validates all updates first, then applies in a single transaction.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChannel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChannel'
          multipart/form-data:
            schema:
