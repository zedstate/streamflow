          description: ID of the channel to insert after. Use null to move to the
            beginning.
    ScopeEnum:
      enum:
      - title
      - channel
      type: string
      description: |-
        * `title` - title
        * `channel` - channel
    Series:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        logo:
          allOf:
          - $ref: '#/components/schemas/VODLogo'
          readOnly: true
        episode_count:
          type: string
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        year:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        rating:
          type: string
          nullable: true
          maxLength: 10
        genre:
          type: string
          nullable: true
          maxLength: 255
        tmdb_id:
          type: string
          nullable: true
          description: TMDB ID for metadata
          maxLength: 50
        imdb_id:
          type: string
          nullable: true
          description: IMDB ID for metadata
          maxLength: 50
        custom_properties:
          nullable: true
          description: Additional metadata and properties for the series
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - episode_count
      - id
      - logo
      - name
      - updated_at
      - uuid
    SeriesRuleRequest:
      type: object
      properties:
        tvg_id:
          type: string
          description: Channel TVG ID
        mode:
          allOf:
          - $ref: '#/components/schemas/ModeEnum'
          default: all
          description: |-
            all: record all episodes, new: record only new episodes

            * `all` - all
            * `new` - new
        title:
          type: string
          description: Series title
      required:
      - tvg_id
    ServerGroup:
      type: object
      description: Serializer for Server Group
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Unique name for this server group.
          maxLength: 100
      required:
      - id
      - name
    SetEpgRequest:
      type: object
      properties:
        epg_data_id:
          type: integer
          description: EPG data ID to link
      required:
      - epg_data_id
    SourceEnum:
      enum:
      - system
      - developer
      type: string
      description: |-
        * `system` - System Generated
        * `developer` - Developer Notification
    SourceTypeEnum:
      enum:
      - xmltv
      - schedules_direct
      - dummy
      type: string
      description: |-
        * `xmltv` - XMLTV URL
        * `schedules_direct` - Schedules Direct API
        * `dummy` - Custom Dummy EPG
    Stream:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        url:
          type: string
          nullable: true
        m3u_account:
          type: integer
          nullable: true
        logo_url:
          type: string
          nullable: true
        tvg_id:
          type: string
          nullable: true
          maxLength: 255
        local_file:
          type: string
          format: uri
          nullable: true
        current_viewers:
          type: integer
          maximum: 2147483647
          minimum: 0
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_seen:
          type: string
          format: date-time
        is_stale:
          type: boolean
          description: Whether this stream is stale (not seen in recent refresh, pending
            deletion)
        is_adult:
          type: boolean
          description: Whether this stream contains adult content
        stream_profile_id:
          type: integer
          nullable: true
        is_custom:
          type: boolean
          description: Whether this is a user-created stream or from an M3U account
        channel_group:
          type: integer
          nullable: true
        stream_hash:
          type: string
          nullable: true
          description: Unique hash for this stream from the M3U account
          maxLength: 255
        stream_stats:
          nullable: true
          description: JSON object containing stream statistics like video codec,
            resolution, etc.
        stream_stats_updated_at:
          type: string
          format: date-time
          nullable: true
          description: When stream statistics were last updated
        stream_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: Provider stream ID (e.g., XC stream_id) for stable identity
            across credential changes
        stream_chno:
          type: number
          format: double
          nullable: true
          description: Provider channel number (XC num or M3U tvg-chno) for ordering
            - supports decimals like 2.1
      required:
      - id
      - updated_at
    StreamByIdsRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          description: List of stream IDs to retrieve
      required:
      - ids
    StreamProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the stream profile
          maxLength: 255
        command:
          type: string
          description: Command to execute (e.g., 'yt.sh', 'streamlink', or 'vlc')
          maxLength: 255
        parameters:
          type: string
          description: Command-line parameters. Use {userAgent} and {streamUrl} as
            placeholders.
        is_active:
          type: boolean
          description: Whether this profile is active
        user_agent:
          type: integer
          nullable: true
          description: Optional user agent to use. If not set, you can fall back to
            a default.
        locked:
          type: boolean
          description: Protected - can't be deleted or modified
      required:
      - id
      - name
    SystemNotification:
      type: object
      description: Serializer for system notifications.
      properties:
        id:
          type: integer
          readOnly: true
        notification_key:
          type: string
          maxLength: 255
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        title:
          type: string
          maxLength: 255
        message:
          type: string
        action_data: {}
        is_active:
          type: boolean
        admin_only:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_dismissed:
          type: string
          readOnly: true
        source:
          $ref: '#/components/schemas/SourceEnum'
      required:
      - created_at
      - id
      - is_dismissed
      - message
      - notification_key
      - title
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
