  /api/channels/channels/{id}/reorder/:
    post:
      operationId: api_channels_channels_reorder_create
      description: Reorder a channel by moving it after another channel (or to the
        start if insert_after_id is null). The channel will receive the next whole
        number after the target channel, and all subsequent channels will be renumbered
        accordingly.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this channel.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderChannelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReorderChannelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReorderChannelRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
